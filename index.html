<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>SilentX</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  /* خلفية غامقة عشان اللون الأحمر يظهر قوته زي الصورة */
  background: radial-gradient(circle at center, #1a0505 0%, #0a0000 100%);
  color: #ffffff;
  padding: 20px;
}

/* البطاقة */
.card {
  width: 100%;
  max-width: 360px;
  text-align: center;
  padding: 40px 20px;
  border-radius: 24px;
  /* لون البطاقة غامق شفاف */
  background: rgba(30, 10, 10, 0.8);
  /* توهج أحمر حول البطاقة */
  box-shadow: 
    0 0 40px rgba(220, 20, 60, 0.2),
    0 0 0 1px rgba(220, 20, 60, 0.3);
  border: 1px solid rgba(220, 20, 60, 0.4);
  backdrop-filter: blur(10px);
  transition: all 0.4s ease;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 
    0 0 50px rgba(220, 20, 60, 0.4),
    0 0 20px rgba(220, 20, 60, 0.2);
  border-color: #dc143c;
}

.avatar {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin-bottom: 20px;
  object-fit: cover;
  /* تحديد الصورة ببرواز أحمر متوهج */
  border: 3px solid #dc143c;
  box-shadow: 0 0 25px rgba(220, 20, 60, 0.6);
  transition: all 0.4s ease;
}

.card:hover .avatar {
  transform: scale(1.05) rotate(5deg);
  box-shadow: 0 0 35px #dc143c;
}

h1 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 15px;
  letter-spacing: 2px;
  color: #ffffff;
  /* ظل أحمر للنص */
  text-shadow: 0 0 15px rgba(220, 20, 60, 0.8);
}

.icons {
  margin: 20px 0;
}

.icons a {
  color: #dc143c; /* اللون الأحمر اللي طلبته */
  margin: 0 15px;
  font-size: 28px;
  transition: all 0.3s ease;
  filter: drop-shadow(0 0 8px rgba(220, 20, 60, 0.5));
}

.icons a:hover {
  color: #ff0000;
  transform: scale(1.4);
  filter: drop-shadow(0 0 15px #ff0000);
}

/* Footer */
.footer {
  margin-top: 30px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.4);
}

.footer a {
  color: #dc143c;
  text-decoration: none;
  font-weight: bold;
}

/* Responsive */
@media (max-width: 400px) {
  .card { padding: 30px 15px; }
  .avatar { width: 120px; height: 120px; }
}
</style>
</head>

<body>

<div class="card">
  <img src="https://cdn.discordapp.com/attachments/1358816521610072115/1494062858458107984/wmremove-transformed-1.png?ex=69e1e6b7&is=69e09537&hm=69d8416aa7a2e283779146354c53df2ff2471804dd2eb5000d6003b486c1635f&" class="avatar" alt="SilentX Logo">
  
  <h1>SilentX</h1>

  <div class="icons">
    <a href="https://discord.gg/4TrnWPRTG" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
    </div>
</div>

<footer class="footer">
  Developed by <a href="#">SilentX</a>
</footer>

</body>
</html>
